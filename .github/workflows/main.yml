name: Self-Hosted CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # DEBUG STEP: This will show us exactly why it can't find the folder
      - name: List files for debugging
        run: |
          echo "Listing root directory:"
          ls -F
          echo "Checking for Dockerfiles:"
          find . -name "Dockerfile"

      - name: Prepare Lowercase Owner Name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          # If the debug step shows "Backend/", change this to ./Backend/Dockerfile
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/week3-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          # If the debug step shows "Frontend/", change this to ./Frontend/Dockerfile
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/week3-frontend:latest
