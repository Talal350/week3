name: Self-Hosted CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.JAMALTOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/jamaltaffal/backend:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to backend server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.JAMALSECRETS }}
          script: |
            set -e

            cd /root/jamal-docker-app

            echo "${{ secrets.JAMALTOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose down backend || true

            docker image prune -f
            docker container prune -f

            docker compose up -d backend
