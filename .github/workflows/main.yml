name: Self-Hosted CI/CD
 
on:
  push:
    branches: [ "main" ]
 
jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend 
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/week3:latest
 
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend 
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/week3/templates:lates
