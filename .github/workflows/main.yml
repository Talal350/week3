name: Self-Hosted CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Backend
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          # If your Dockerfile is INSIDE the backend folder:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/talal350/week3-backend:latest

      # Build Frontend
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          # If your Dockerfile is INSIDE the frontend folder:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/talal350/week3-frontend:latest
