name: Self-Hosted CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: ls -R

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.WEEK3T }}

      # ---------------- BACKEND ----------------
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/talal350/week3:latest
            ghcr.io/talal350/week3:${{ github.sha }}

      # ---------------- FRONTEND ----------------
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./templates
          file: ./templates/Dockerfile
          push: true
          tags: |
            ghcr.io/talal350/week3-templates:latest
            ghcr.io/talal350/week3-templates:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
    - name: Deploy locally with Docker Compose
      run:
            set -e

            cd /home/cybersecurity/week3

            echo "${{ secrets.WEEK3T }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker-compose down
            docker-compose up 
